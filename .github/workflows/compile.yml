name: Compile Pawn

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential

    - name: Clone compiler
      run: |
        git clone https://github.com/Zeex/pawn.git

    - name: Build compiler
      run: |
        cd pawn/source/compiler || exit 1
        make

    - name: Move compiler
      run: |
        sudo cp pawn/source/compiler/pawncc /usr/local/bin/

    - name: Test compiler
      run: |
        pawncc -v

    - name: Compile gamemode
      run: |
        pawncc gamemodes/Main.pwn -o gamemodes/Main.amx

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: gamemode
        path: gamemodes/Main.amx

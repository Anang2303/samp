name: Compile Pawn

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip

    - name: Download working compiler
      run: |
        wget https://github.com/pawn-lang/compiler/releases/download/v3.10.10/pawnc-linux.tar.gz
        tar -xvzf pawnc-linux.tar.gz

    - name: Move compiler
      run: |
        chmod +x pawncc || true
        sudo mv pawncc /usr/local/bin/

    - name: Compile gamemode
      run: |
        pawncc gamemodes/Main.pwn -o gamemodes/Main.amx

    - name: Upload AMX
      uses: actions/upload-artifact@v4
      with:
        name: gamemode
        path: gamemodes/Main.amx

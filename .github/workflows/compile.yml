name: Compile Pawn

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Pawn compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip

    - name: Download compiler
      run: |
        wget https://github.com/pawn-lang/compiler/releases/download/v3.10.10/pawnc-linux.tar.gz || true
        tar -xvzf pawnc-linux.tar.gz || true

    - name: Compile
      run: |
        chmod +x pawncc || true
        ./pawncc gamemodes/Main.pwn -o gamemodes/Main.amx || true

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: gamemode
        path: gamemodes/Main.amx

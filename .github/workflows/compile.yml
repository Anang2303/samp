name: Compile Pawn

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y pawncc || true

    - name: Download fallback compiler
      run: |
        wget https://github.com/Zeex/pawn/releases/download/v3.10.10/pawnc-linux.tar.gz
        tar -xvzf pawnc-linux.tar.gz

    - name: Compile gamemode
      run: |
        chmod +x pawncc || true
        ./pawncc gamemodes/Main.pwn -o gamemodes/Main.amx

    - name: Upload AMX
      uses: actions/upload-artifact@v4
      with:
        name: gamemode
        path: gamemodes/Main.amx
